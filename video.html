<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>正在播放 - 视频站</title>
  <style>
    :root { --primary: #009A44; }
    body { margin: 0; background: #f1f2f3; font-family: sans-serif; }
    header { height: 60px; background: #fff; display: flex; align-items: center; padding: 0 40px; }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--primary); font-size: 22px; font-weight: bold; }
    .logo img { height: 40px; }
    .main { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    .player-box { background: #000; border-radius: 10px; overflow: hidden; }
    video { width: 100%; display: block; }
    .v-info { margin-top: 20px; background: #fff; padding: 25px; border-radius: 10px; }
  </style>
</head>
<body>
<header>
  <a href="index.html" class="logo">
    <img src="logo.png" alt="视频站">
    <span>视频站</span>
  </a>
</header>
<div class="main">
  <div class="player-box"><video id="player" controls autoplay></video></div>
  <div class="v-info">
    <h1 id="title" style="font-size:20px; margin:0;">正在加载...</h1>
    <p style="color:#999; font-size:14px; margin-top:10px;">提示：静态版暂不支持保存点赞和评论</p>
  </div>
</div>

<script>
  // 必须与 index.html 的列表顺序完全一致
  const myVideos = [
      { name: "我的B站投稿视频", bvid: "BV1U38CzfEkD" },
      { name: "01 门捷列夫是怎样“炼”成的.mp4" },
      { name: "【1080P Full Movie】《举起手来》" }
  ];

  let currentFileName = "";

  async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const video = myVideos[id];
    // 这里的 playerContainer 对应你 HTML 中包裹播放器的 div
    const container = document.querySelector('.player-box'); 

    if (video) {
      currentFileName = video.name;
      document.getElementById('title').innerText = currentFileName;

      if (video.bvid) {
        // 插入你提供的 B 站嵌入代码，并加上高清和自适应参数
        container.innerHTML = `
          <iframe src="//player.bilibili.com/player.html?bvid=${video.bvid}&page=1&high_quality=1&as_wide=1" 
            scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" 
            style="width:100%; height:100%; border:none;">
          </iframe>`;
      } else {
        // 播放 uploads 文件夹下的本地视频
        container.innerHTML = `
          <video id="player" controls autoplay style="width:100%; height:100%;">
            <source src="uploads/${encodeURIComponent(currentFileName)}" type="video/mp4">
          </video>`;
      }
      
      loadStaticRecs(id);
    } else {
      document.getElementById('title').innerText = "视频不存在";
    }
  }

  // 简单的静态推荐逻辑
  function loadStaticRecs(currentId) {
    const list = document.getElementById('recommendList');
    const others = myVideos.map((v, i) => ({...v, id: i})).filter(v => v.id != currentId);
    list.innerHTML = others.map(v => `
      <a href="video.html?id=${v.id}" class="rec-item">
        <div class="rec-cover">🎬</div>
        <div class="rec-title">${v.name}</div>
      </a>
    `).join('');
  }

  window.onload = init;
</script>
</body>
</html>
